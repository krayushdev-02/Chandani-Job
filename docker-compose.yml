version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: chandandijobs-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: chandandijobs-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/chandandijobs
      - PORT=5000
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: chandandijobs-frontend
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  mongo-data:
